<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flying Bird - Mobile IDE Sample</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>🐦 Flying Bird</h1>
            <div class="score-display">
                <div class="current-score">
                    <span class="label">Score</span>
                    <span class="value" id="current-score">0</span>
                </div>
                <div class="best-score">
                    <span class="label">Best</span>
                    <span class="value" id="best-score">0</span>
                </div>
            </div>
        </div>

        <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            
            <div class="game-overlay" id="gameOverlay">
                <div class="start-screen" id="startScreen">
                    <div class="bird-demo">🐦</div>
                    <h2>Ready to Fly?</h2>
                    <p>Tap to flap your wings</p>
                    <button class="btn btn-primary" id="startBtn">Start Game</button>
                </div>
                
                <div class="game-over-screen" id="gameOverScreen" style="display: none;">
                    <div class="game-over-content">
                        <h2>Game Over!</h2>
                        <div class="final-score">
                            <span>Score: </span>
                            <span id="finalScore">0</span>
                        </div>
                        <div class="new-best" id="newBest" style="display: none;">
                            🎉 New Best Score! 🎉
                        </div>
                        <button class="btn btn-primary" id="restartBtn">Play Again</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="game-controls">
            <div class="instructions">
                <p>🎮 Tap anywhere to flap</p>
                <p>🎯 Avoid the pipes and fly as far as you can!</p>
            </div>
            
            <div class="control-buttons">
                <button class="btn btn-secondary" id="pauseBtn">⏸️ Pause</button>
                <button class="btn btn-secondary" id="muteBtn">🔊 Sound</button>
            </div>
        </div>

        <footer>
            <p>Built for Mobile Web Development • HTML5 Canvas Game</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
